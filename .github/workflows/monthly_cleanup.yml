name: Monthly DB Cleanup

on:
  schedule:
    - cron: '0 3 1 * *' # UTC 03:00, 毎月1日
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run cleanup
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/db_cleanup.py
      - name: Notify failure
        if: failure() && secrets.DISCORD_WEBHOOK_URL != ''
        run: |
          curl -H "Content-Type: application/json" -d "{\"content\":\"🚨 monthly_cleanup.yml failed: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" "${{ secrets.DISCORD_WEBHOOK_URL }}"

