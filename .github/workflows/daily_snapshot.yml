name: Daily Snapshot

on:
  schedule:
    - cron: '0 11 * * *' # UTC 11:00 = JST 20:00
  workflow_dispatch:

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Record snapshot
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/snapshot_recorder.py
      - name: Notify failure
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "DISCORD_WEBHOOK_URL is not set. Skip notify."
            exit 0
          fi
          curl -H "Content-Type: application/json" -d "{\"content\":\"🚨 daily_snapshot.yml failed: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" "$DISCORD_WEBHOOK_URL"

