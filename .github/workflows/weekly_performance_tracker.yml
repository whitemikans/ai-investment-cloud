name: AI Recommendation Performance Tracker

on:
  schedule:
    - cron: "0 22 * * 0" # UTC 22:00 Sunday = JST Monday 07:00
  workflow_dispatch:

jobs:
  track-performance:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run performance tracker
        run: python performance_tracker.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Upload tracker log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-tracker-${{ github.run_number }}
          path: dashboard_events.log
          if-no-files-found: ignore
          retention-days: 30

      - name: Notify error to Discord
        if: failure()
        run: |
          python - <<'PY'
          import os, requests
          url = os.getenv("DISCORD_WEBHOOK_URL", "").strip()
          if url:
              requests.post(
                  url,
                  json={"content": "🚨 weekly_performance_tracker.yml failed. Check GitHub Actions run logs."},
                  timeout=10,
              )
          PY
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
